version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - ./init-kafka.sh:/tmp/init-kafka.sh

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: workflow_system
    volumes:
      - ./mysql-init.sql:/docker-entrypoint-initdb.d/mysql-init.sql
      - mysql_data:/var/lib/mysql

  api-gateway:
    build: ../../services/api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - kafka
      - mysql
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_HOST: kafka:9092
      MYSQL_HOST: mysql:3306
    restart: on-failure

  workflow-service:
    build: ../../services/workflow-service
    ports:
      - "8081:8081"
    depends_on:
      - kafka
      - mysql
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_HOST: kafka:9092
      MYSQL_HOST: mysql:3306
    restart: on-failure

  notification-service:
    build: ../../services/notification-service
    ports:
      - "8082:8082"
    depends_on:
      - kafka
      - mysql
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_HOST: kafka:9092
      MYSQL_HOST: mysql:3306
    restart: on-failure

  auth-service:
    build: ../../auth-module
    ports:
      - "8083:8083"
    depends_on:
      - kafka
      - mysql
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_HOST: kafka:9092
      MYSQL_HOST: mysql:3306
    restart: on-failure

volumes:
  mysql_data: