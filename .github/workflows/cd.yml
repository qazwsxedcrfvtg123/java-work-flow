name: CD Pipeline

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Images
      run: |
        # Build artifacts
        ./mvnw clean package -DskipTests
        
        # Build and tag images
        cd services/api-gateway
        docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ github.ref_name }} .
        docker tag ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ github.ref_name }} ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest
        cd ../workflow-service
        docker build -t ${{ secrets.DOCKER_USERNAME }}/workflow-service:${{ github.ref_name }} .
        docker tag ${{ secrets.DOCKER_USERNAME }}/workflow-service:${{ github.ref_name }} ${{ secrets.DOCKER_USERNAME }}/workflow-service:latest
        cd ../notification-service
        docker build -t ${{ secrets.DOCKER_USERNAME }}/notification-service:${{ github.ref_name }} .
        docker tag ${{ secrets.DOCKER_USERNAME }}/notification-service:${{ github.ref_name }} ${{ secrets.DOCKER_USERNAME }}/notification-service:latest

    - name: Push Docker Images
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ github.ref_name }}
        docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/workflow-service:${{ github.ref_name }}
        docker push ${{ secrets.DOCKER_USERNAME }}/workflow-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/notification-service:${{ github.ref_name }}
        docker push ${{ secrets.DOCKER_USERNAME }}/notification-service:latest

  deploy-to-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'

    steps:
    - uses: actions/checkout@v3

    - name: Setup Kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Set up Docker
      uses: docker/setup-docker@v2

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Get EKS kubeconfig
      run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }}

    - name: Deploy to Kubernetes
      run: |
        # Update image tags in deployment files
        sed -i "s|api-gateway:latest|${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ github.ref_name }}|g" deploy/k8s/api-gateway/deployment.yml
        sed -i "s|workflow-service:latest|${{ secrets.DOCKER_USERNAME }}/workflow-service:${{ github.ref_name }}|g" deploy/k8s/workflow-service/deployment.yml
        sed -i "s|notification-service:latest|${{ secrets.DOCKER_USERNAME }}/notification-service:${{ github.ref_name }}|g" deploy/k8s/notification-service/deployment.yml
        
        # Deploy to Kubernetes
        ./scripts/k8s-deploy.sh